services:
  database:
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: '${DB_NAME}'
      POSTGRES_USER: '${DB_USERNAME}'
      POSTGRES_PASSWORD: '${DB_PASSWORD}'
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready']
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s

  billy191-services:
    build: .
    ports:
      - '${PORT}:${PORT}'
    networks:
      - default
      - shared-net
    environment:
      - DB_HOST=database
      - DB_PORT=${DB_PORT}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - PORT=${PORT}
    depends_on:
      - database
    restart: on-failure

volumes:
  postgres_data:

networks:
  shared-net:
    name: billy-shared-network # This project owns/creates the network
